<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>
  <div class="container mt-4">
    <div class="card mb-3 shadow-sm position-absolute top-50 start-50 translate-middle">
      <div class="row g-0">

        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title">Student Application</h5>
            <p class="card-title">Student Name:{{application.student.name}}</p>
            <p class="card-title"> Department: {{application.student.department}}</p>
            <p class="card-title"> Drive: {{application.drive.name}}</p>
            <p class="card-title"> Job Title: {{application.drive.job_title}}</p>
          </div>
        </div>
        <div class="col-md-4">
          <img src="https://thumbs.dreamstime.com/b/student-icon-vector-graduation-mortar-board-school-college-university-glyph-pictogram-male-person-profile-avatar-108392101.jpg" class="img-fluid rounded-start" alt="...">
        </div>

        <div class=" d-flex align-items-center justify-content-center gap-5 m-4">

         <a href="{{ url_for('view_resume', filename=application.student.resume) }}" class="btn btn-outline-info" target="_blank">
    View Resume
</a>
          <a href="/admin" class="btn btn-outline-info">back</a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
