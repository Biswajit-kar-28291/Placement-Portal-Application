<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>
  <div class="row">
    <div class="col"></div>
    <div class="col-6 position-absolute top-50 start-50 translate-middle">
      <form class="border border-black rounded-5 p-3 shadow bg-body-secondary" action="/login" method="post">
        <h1 class="text-center">Login</h1>
        <div class="container">
          <div class="mb-3">
            <label class="form-label mb-2 text-body-secondary">Username</label>
            <input type="username" class="form-control border-black" id="username" name="username" />
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label mb-2 text-body-secondary">Password</label>
            <input type="password" class="form-control border-black" id="exampleInputPassword1" name="password" />
          </div>

          <div class="text-center">
            <input type="submit" class="btn btn-primary m-auto" value="Login ">
          </div>

          <p class="text-center mt-2"> Do not have an account?<a href="/register"
              class="link-dark link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Register</a>
          </p>
        </div>
      </form>
    </div>
    <div class="col"></div>
  </div>
</body>

</html>
