<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</head>

<body>
  <div class="container">
    <div class="mt-4 p-3 mb-2 bg-body-secondary rounded shadow-sm">
      <div class="row">
        <div class="col text-left">
          <h3>Student Application History</h3>
        </div>
        <div class="col d-flex justify-content-end">
          <a href="/student/{{this_user.user_id}}" class="btn btn-outline-info d-flex ms-auto">Back</a>
        </div>
      </div>
    </div>

    <h6 class="mt-4">Student Name: {{this_user.name}}</h6>
    <h6 class="mt-4">Department: {{this_user.department}}</h6>


    <div class="border rounded pt-1 ps-3 pe-2 mt-3 shadow-sm">

      <table class="table">
        <thead>
          <tr>
            <th scope="col">Drive No.</th>
            <th scope="col">Interview</th>
            <th scope="col">Job Title</th>
            <th scope="col">Result</th>
            <th scope="col"> Remark</th>
          </tr>
        </thead>
        <tbody>
          {% for application in this_user.applications %}
          <tr>
            <th scope="row">{{application.id}}</th>
            <td>In-person</td>
            <td>{{application.drive.job_title}}</td>
            <td>{{application.status}}</td>
            <td>None</td>
          </tr>
          {% endfor %}

        </tbody>
      </table>
    </div>
  </div>
</body>

</html>
